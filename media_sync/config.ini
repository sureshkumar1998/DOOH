[server]
# Base URL of your Django backend (no trailing slash)
api_url = http://localhost:8000

[sync]
# Player folder — only THIS station's live, slot-ordered ads are published here.
# (welcome.coffee reads this folder via the /ad-images list.)
download_folder = /home/sureshr/ccu/ccuUI/www/images/Ad

# Cache for ALL active media (pre-positioned; not shown directly to the player).
cache_folder = /home/sureshr/ads-system/media_sync/cache

# Static ad list the player fetches at /ad-images. Defaults to <www>/ad-images
# (two levels above download_folder). Override here only if your layout differs.
# ad_list_path = /home/sureshr/ccu/ccuUI/www/ad-images

# How often to poll the API for changes (seconds)
poll_interval_seconds = 30

[logging]
# Log file path (leave blank to log to console only)
log_file = /home/sureshr/ads-system/media_sync/sync.log

[device]
# Station identity is read from the CCU's config.yaml (mqis.serial_number / mqis.Zone).
station_config = /home/sureshr/ccu/setup/config.yaml
# Fallback values (used only if config.yaml is missing/unreadable):
device_id = WMQISXM1V1-00555
zone = Bengaluru
station = WMQISXM1V1-00555
